<main
  class="relative isolate flex min-h-dvh items-center justify-center overflow-hidden bg-[radial-gradient(circle_at_18%_15%,rgba(255,255,255,0.34),transparent_24%),radial-gradient(circle_at_82%_18%,rgba(59,130,246,0.22),transparent_28%),linear-gradient(145deg,#991b1b_0%,#dc2626_32%,#f59e0b_68%,#fef3c7_100%)] px-3 py-3 sm:px-5 sm:py-5">
  <div class="absolute inset-x-0 bottom-0 h-28 bg-gradient-to-t from-black/20 to-transparent"></div>

  <img src="img/pikachu.png" alt=""
    class="pointer-events-none absolute bottom-1 right-1 z-0 w-24 select-none drop-shadow-2xl sm:bottom-3 sm:right-5 sm:w-32 lg:w-40"
    draggable="false" />

  <section class="relative z-10 grid w-full max-w-6xl items-center gap-3 lg:grid-cols-[0.8fr_1.2fr]">
    <header class="flex flex-col items-center text-center lg:items-start lg:text-left">
      <div
        class="mb-2 flex h-16 w-16 items-center justify-center rounded-full border-4 border-white bg-white shadow-2xl shadow-red-950/30 sm:h-20 sm:w-20">
        <svg viewBox="0 0 100 100" class="h-12 w-12 sm:h-16 sm:w-16">
          <circle cx="50" cy="50" r="48" fill="white" stroke="#CC0000" stroke-width="6" />
          <path d="M2 50 A48 48 0 0 1 98 50" fill="#CC0000" />
          <line x1="2" y1="50" x2="98" y2="50" stroke="#222" stroke-width="4" />
          <circle cx="50" cy="50" r="14" fill="white" stroke="#222" stroke-width="4" />
          <circle cx="50" cy="50" r="7" fill="#CC0000" />
        </svg>
      </div>

      <h1
        class="text-[clamp(2.4rem,8vw,5.2rem)] font-black leading-none text-white drop-shadow-[0_5px_0_rgba(127,29,29,0.9)]">
        PokeMemory
      </h1>
      <p class="mt-2 max-w-sm text-sm font-semibold text-yellow-50 drop-shadow sm:text-base">
        Encuentra parejas, sube de nivel y juega con Pokemon distintos en cada partida.
      </p>
    </header>

    <section
      class="rounded-2xl border border-white/30 bg-white/18 p-3 shadow-2xl shadow-red-950/20 backdrop-blur-md sm:p-4">
      <div class="mb-3 flex items-end justify-between gap-3">
        <div>
          <h2 class="text-lg font-black leading-tight text-white drop-shadow sm:text-xl">
            Elige tu nivel
          </h2>
          <p class="text-xs font-semibold text-yellow-50/85 sm:text-sm">
            El tablero se adapta a tu pantalla.
          </p>
        </div>
      </div>

      <div class="grid grid-cols-1 gap-1.5 sm:grid-cols-2 lg:grid-cols-2 xl:gap-2">
        @for (nivel of niveles; track $index) {
        <button
          class="group relative flex min-h-14 w-full cursor-pointer items-center gap-2 rounded-xl border border-white/25 bg-white/14 px-2.5 py-2 text-left text-white shadow-lg shadow-red-950/10 backdrop-blur-md transition-all hover:-translate-y-0.5 hover:border-yellow-200 hover:bg-white/25 data-[selected=true]:border-white data-[selected=true]:bg-yellow-300 data-[selected=true]:text-gray-950 data-[selected=true]:shadow-yellow-950/20 sm:min-h-16 sm:gap-3 sm:px-3"
          [attr.data-selected]="nivelSeleccionado() === $index" (click)="seleccionarNivel($index)"
          [attr.aria-pressed]="nivelSeleccionado() === $index">
          <span
            class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-black/20 text-sm font-black text-white transition-colors group-data-[selected=true]:bg-black/10 group-data-[selected=true]:text-gray-950 sm:h-9 sm:w-9 sm:text-base">
            {{ $index + 1 }}
          </span>

          <span class="flex min-w-0 flex-1 flex-col leading-tight">
            <span class="break-words text-sm font-black sm:text-base">
              {{ obtenerNombreNivel($index) }}
            </span>
            <span class="text-xs font-semibold opacity-75">
              {{ obtenerTotalCartas(nivel) }} cartas
            </span>
          </span>

          <span class="flex shrink-0 flex-col items-end text-xs font-bold opacity-80">
            <span>{{ nivel.filas }} x {{ nivel.columnas }}</span>
            <span>{{ nivel.tiempoSegundos }}s</span>
          </span>

          @if (nivelSeleccionado() === $index) {
          <span
            class="absolute -right-2 -top-2 flex h-6 w-6 items-center justify-center rounded-full bg-green-600 text-xs font-black text-white shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4">
              <path fill-rule="evenodd"
                d="M16.704 5.29a1 1 0 00-1.408-1.42L8.75 10.36 5.704 7.29a1 1 0 10-1.408 1.42l3.75 3.75a1 1 0 001.408 0l7.25-7.17z"
                clip-rule="evenodd" />
            </svg>
          </span>
          }
        </button>
        }
      </div>

      <button
        class="mt-3 flex w-full cursor-pointer items-center justify-center gap-2 rounded-xl border-2 border-white bg-gray-950 px-8 py-3 text-base font-black text-yellow-300 shadow-xl shadow-red-950/25 transition-all hover:-translate-y-0.5 hover:bg-gray-900 active:translate-y-0 active:scale-95 sm:text-lg"
        (click)="empezar()">
        <span>Empezar</span>
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6" />
        </svg>
      </button>
    </section>
  </section>
</main>
