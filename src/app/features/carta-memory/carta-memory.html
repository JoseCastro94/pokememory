<div
  class="carta-contenedor"
  [class.carta-encontrada]="carta().encontrada"
  (click)="seleccionar()"
  role="button"
  [attr.aria-label]="carta().volteada ? carta().nombre : 'Carta boca abajo'"
  tabindex="0"
  (keydown.enter)="seleccionar()"
>
  <div
    class="carta-interior"
    [class.carta-volteada]="carta().volteada || carta().encontrada"
  >
    <div class="carta-trasera">
      <img
        src="img/carta-volteada.png"
        alt="Carta boca abajo"
        class="w-full h-full object-cover rounded-xl"
        draggable="false"
      />
      <div class="pokeball-overlay">
        <svg viewBox="0 0 100 100" class="w-8 h-8 opacity-25">
          <circle cx="50" cy="50" r="48" fill="none" stroke="white" stroke-width="4"/>
          <line x1="2" y1="50" x2="98" y2="50" stroke="white" stroke-width="4"/>
          <circle cx="50" cy="50" r="12" fill="white" stroke="white" stroke-width="4"/>
        </svg>
      </div>
    </div>

    <div class="carta-frontal">
      <div class="carta-fondo-tipo">
        <img
          [src]="carta().imagenUrl"
          [alt]="carta().nombre"
          class="pokemon-imagen"
          loading="lazy"
          draggable="false"
        />
       <!--
        <span class="pokemon-nombre">{{ carta().nombre }}</span>
       -->
      </div>
    </div>
  </div>
</div>
